    - MapReduceEnsemble: guides/map-reduce.md
    - Tools: guides/tools.md
    - Built-in Tools: guides/built-in-tools.md
    - Tool Pipeline: guides/tool-pipeline.md
    - Remote Tools: guides/remote-tools.md
    - Metrics: guides/metrics.md
    - CaptureMode: guides/capture-mode.md
    - Visualization: guides/visualization.md
    - Memory: guides/memory.md
    - Review: guides/review.md
    - Live Dashboard: guides/live-dashboard.md
    - Delegation: guides/delegation.md
    - Error Handling: guides/error-handling.md
    - Callbacks: guides/callbacks.md
    - Guardrails: guides/guardrails.md
    - Logging: guides/logging.md
    - Template Variables: guides/template-variables.md
