[versions]
vanniktech-publish = "0.36.0"
langchain4j      = "1.11.0"
lombok           = "1.18.42"
jackson          = "2.21.1"
slf4j            = "2.0.17"
junit            = "6.0.3"
junit-platform   = "6.0.3"
assertj          = "3.27.7"
mockito          = "5.22.0"
logback          = "1.5.32"
spotless         = "7.0.2"
errorprone       = "4.2.0"
errorprone-core  = "2.36.0"

[libraries]
langchain4j               = { group = "dev.langchain4j", name = "langchain4j",          version.ref = "langchain4j" }
langchain4j-core          = { group = "dev.langchain4j", name = "langchain4j-core",     version.ref = "langchain4j" }
langchain4j-open-ai       = { group = "dev.langchain4j", name = "langchain4j-open-ai",  version.ref = "langchain4j" }
lombok                    = { group = "org.projectlombok",              name = "lombok",                   version.ref = "lombok"   }
jackson-databind          = { group = "com.fasterxml.jackson.core",     name = "jackson-databind",         version.ref = "jackson"  }
slf4j-api                 = { group = "org.slf4j",                      name = "slf4j-api",                version.ref = "slf4j"    }
slf4j-simple              = { group = "org.slf4j",                      name = "slf4j-simple",             version.ref = "slf4j"    }
junit-jupiter             = { group = "org.junit.jupiter",              name = "junit-jupiter",            version.ref = "junit"    }
junit-platform-launcher   = { group = "org.junit.platform",             name = "junit-platform-launcher",  version.ref = "junit-platform" }
assertj-core              = { group = "org.assertj",                    name = "assertj-core",             version.ref = "assertj"  }
mockito-core              = { group = "org.mockito",                    name = "mockito-core",             version.ref = "mockito"  }
logback-classic           = { group = "ch.qos.logback",                 name = "logback-classic",          version.ref = "logback"  }
errorprone-core           = { group = "com.google.errorprone",          name = "error_prone_core",         version.ref = "errorprone-core" }

[plugins]
vanniktech-publish = { id = "com.vanniktech.maven.publish", version.ref = "vanniktech-publish" }
spotless           = { id = "com.diffplug.spotless",        version.ref = "spotless"           }
errorprone         = { id = "net.ltgt.errorprone",          version.ref = "errorprone"         }
