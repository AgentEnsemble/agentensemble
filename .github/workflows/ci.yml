name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build and test
        run: ./gradlew build --continue

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: agentensemble-core/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'
          comment_mode: always

  dependency-submission:
    name: Submit Dependency Graph
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v5

  dependabot-automerge:
    name: Dependabot Auto-Merge
    runs-on: ubuntu-latest
    needs: [build]
    # Guard against 'skipped' in addition to 'failure'/'cancelled'. Without this guard,
    # a skipped build (where tests never ran) would still satisfy the condition and could
    # allow auto-merge to proceed without any CI validation.
    if: |
      always() &&
      github.actor == 'dependabot[bot]' &&
      github.event_name == 'pull_request' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      !contains(needs.*.result, 'skipped')
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for patch/minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
          echo "Auto-merge enabled for ${{ steps.metadata.outputs.update-type }} update"
          # NOTE: gh pr merge --auto only waits for required status checks when branch
          # protection rules with required checks are configured on main. Without branch
          # protection, the PR may merge immediately. Ensure branch protection is configured
          # on main with the 'build' job as a required check.
          echo "Will merge automatically when all required checks pass"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on major updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "${{ github.event.pull_request.html_url }}" --body "**Major version update detected** - requires manual review before merge.

          This update may contain breaking changes. Please:
          1. Review the changelog/release notes
          2. Verify CI passes
          3. Manually approve and merge when ready"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
