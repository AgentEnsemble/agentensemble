name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build, Publish and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${VERSION} (tag: ${TAG})"

      - name: Build and test
        run: ./gradlew build -Pversion=${{ steps.version.outputs.version }}

      - name: Publish to Maven Central
        run: ./gradlew :agentensemble-core:publishAndReleaseToMavenCentral -Pversion=${{ steps.version.outputs.version }}
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.ORG_GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.ORG_GPG_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_MAVEN_CENTRAL_PASSWORD }}

      - name: Publish to GitHub Packages
        run: ./gradlew :agentensemble-core:publishAllPublicationsToGitHubPackagesRepository -Pversion=${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Upload artifacts to GitHub Release
        run: |
          gh release upload ${{ steps.version.outputs.tag }} \
            agentensemble-core/build/libs/agentensemble-core-${{ steps.version.outputs.version }}.jar \
            agentensemble-core/build/libs/agentensemble-core-${{ steps.version.outputs.version }}-sources.jar \
            agentensemble-core/build/libs/agentensemble-core-${{ steps.version.outputs.version }}-javadoc.jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version to next SNAPSHOT
        run: |
          IFS='.' read -ra PARTS <<< "${{ steps.version.outputs.version }}"
          NEXT_PATCH=$((${PARTS[2]} + 1))
          NEXT_VERSION="${PARTS[0]}.${PARTS[1]}.${NEXT_PATCH}"
          git fetch origin main
          git checkout main
          sed -i "s/^version=.*/version=${NEXT_VERSION}-SNAPSHOT/" gradle.properties
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "chore: bump version to ${NEXT_VERSION}-SNAPSHOT [skip ci]"
          git push origin main
