name: Bug Report
description: Report a bug or unexpected behavior in AgentEnsemble.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the fields below as completely as possible to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what is going wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal, reproducible example or step-by-step instructions.
      placeholder: |
        1. Configure an Ensemble with...
        2. Call ensemble.run()...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentEnsemble Version
      placeholder: "e.g. 0.4.0"
    validations:
      required: true

  - type: input
    id: java_version
    attributes:
      label: Java Version
      placeholder: "e.g. 21.0.3"
    validations:
      required: true

  - type: input
    id: llm_provider
    attributes:
      label: LLM Provider
      description: Which LLM provider and model are you using?
      placeholder: "e.g. OpenAI gpt-4o, Anthropic claude-3-5-sonnet"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14, Ubuntu 22.04, Windows 11"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Stack Trace
      description: Paste any relevant log output or stack traces here.
      render: text
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that may be relevant (e.g. configuration snippets, related issues).
    validations:
      required: false
