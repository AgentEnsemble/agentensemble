<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="aeGrad" x1="120" y1="120" x2="480" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4FF"/>
      <stop offset="0.45" stop-color="#4D95FF"/>
      <stop offset="1" stop-color="#8363F9"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="420" fill="white"/>
  <text x="60" y="80" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="44" font-weight="650" fill="#111827">AgentEnsemble — Brand Colors</text>

  <!-- Swatches -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" fill="#111827">
    <g transform="translate(80,120)">
      <rect x="0" y="0" width="170" height="170" rx="28" fill="#4D95FF"/>
      <text x="0" y="210" font-size="26" font-weight="650">Primary</text>
      <text x="0" y="242" font-size="22">#4D95FF</text>
    </g>

    <g transform="translate(290,120)">
      <rect x="0" y="0" width="170" height="170" rx="28" fill="#8363F9"/>
      <text x="0" y="210" font-size="26" font-weight="650">Secondary</text>
      <text x="0" y="242" font-size="22">#8363F9</text>
    </g>

    <g transform="translate(500,120)">
      <rect x="0" y="0" width="170" height="170" rx="28" fill="#2DD4FF"/>
      <text x="0" y="210" font-size="26" font-weight="650">Accent</text>
      <text x="0" y="242" font-size="22">#2DD4FF</text>
    </g>

    <g transform="translate(710,120)">
      <rect x="0" y="0" width="170" height="170" rx="28" fill="#111827"/>
      <text x="0" y="210" font-size="26" font-weight="650">Dark</text>
      <text x="0" y="242" font-size="22">#111827</text>
    </g>

    <g transform="translate(920,120)">
      <rect x="0" y="0" width="170" height="170" rx="28" fill="#F2F4F8" stroke="#E5E7EB"/>
      <text x="0" y="210" font-size="26" font-weight="650">Light</text>
      <text x="0" y="242" font-size="22">#F2F4F8</text>
    </g>
  </g>

  <!-- Gradient reference -->
  <g transform="translate(80,330)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
          font-size="22" fill="#111827">Primary gradient (use for strokes/fills)</text>
    <rect x="0" y="20" width="520" height="30" rx="15" fill="url(#aeGrad)" />
  </g>
</svg>
